version: '3.8'

services:
  app:
    build: .
    container_name: ptc-app
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
    
    depends_on: 
      - db 
    networks:
      - ptc-network
  
  db:
    image: postgres:15
    container_name: ptc-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ptc-network
  
volumes:
  pgdata:
  
networks:
  ptc-network:
    driver: bridge