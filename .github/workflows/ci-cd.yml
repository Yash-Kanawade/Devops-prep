name: PTC Monitor CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: yashkanawade03/ptc-monitor

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd capstone/ptc-monitor
        pip install -r requirements.txt

    - name: Run smoke tests
      env:
        APP_NAME: test-app
        APP_ENV: test
        APP_VERSION: 1.0.0
      run: |
        cd capstone/ptc-monitor
        python -c "from app.main import app; print('✅ App imports successfully')"
        python -c "from app.metrics import get_all_metrics; print('✅ Metrics module OK')"
        python -c "
        import os
        os.environ['APP_NAME'] = 'test'
        os.environ['APP_ENV'] = 'test'
        os.environ['APP_VERSION'] = '1.0.0'
        from app.metrics import get_cpu_metrics, get_memory_metrics, get_disk_metrics
        cpu = get_cpu_metrics()
        mem = get_memory_metrics()
        disk = get_disk_metrics()
        print(f'✅ CPU metrics: {cpu}')
        print(f'✅ Memory metrics: {mem}')
        print(f'✅ Disk metrics: {disk}')
        "

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Get short SHA
      id: sha
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./capstone/ptc-monitor
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Summary
      run: |
        echo "✅ Pipeline complete"
        echo "Image: ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.sha_short }}"
        echo "Also tagged as: ${{ env.IMAGE_NAME }}:latest"