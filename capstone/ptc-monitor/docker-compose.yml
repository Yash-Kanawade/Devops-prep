version: '3.8'

services:
  ptc-monitor:
    build: .
    container_name: ptc-monitor
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_VERSION=${APP_VERSION}
      - APP_ENV=${APP_ENV}
    restart: unless-stopped
    healthcheck:
      test: ["CMD","python","-c","import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: ptc-monitor-network
