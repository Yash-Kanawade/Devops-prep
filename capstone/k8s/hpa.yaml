apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ptc-monitor-hpa
  namespace: development
spec:
  scaleTargetRef:
    apiVersion: app/v1
    kind: Deployment
    name: ptc-monitor
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
